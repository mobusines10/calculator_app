name: calculator_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.3.2
  change_app_package_name: ^1.5.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - appIcon/CALCIX.jpg

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "appIcon/CALCIX.jpg"
  adaptive_icon_background: "#080810"
  adaptive_icon_foreground: "appIcon/CALCIX.jpg"
flutter_native_splash:
  color: "#080810"
  android: true
  ios: true